spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=clinic;encrypt=false
    username: sa
    password: 123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
